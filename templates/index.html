<!DOCTYPE html>
<html>
<head>
<title>Parkinson Detection</title>

<style>

body{
font-family: Arial;
background:#f4f7fb;
text-align:center;
}

.container{
width:500px;
margin:auto;
margin-top:80px;
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

h1{
color:#2c3e50;
}

button{
padding:12px 25px;
background:#3498db;
border:none;
color:white;
font-size:16px;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#2980b9;
}

#preview{
margin-top:20px;
width:250px;
border-radius:8px;
}

#result{
margin-top:20px;
font-size:22px;
font-weight:bold;
}

.footer{
margin-top:30px;
font-size:14px;
color:gray;
}

</style>

</head>

<body>

<div class="container">

<h1>🧠 Parkinson Spiral Detection</h1>

<p>Upload spiral drawing to detect Parkinson risk</p>

<input type="file" id="imageUpload" onchange="previewImage()">

<br><br>

<img id="preview">

<br><br>

<button onclick="uploadImage()">Predict</button>

<h2 id="result"></h2>

<div class="footer">

<p>AI Based Medical Detection System</p>

<a href="https://en.wikipedia.org/wiki/Parkinson%27s_disease" target="_blank">
Learn about Parkinson Disease
</a>

</div>

</div>

<script src="/static/script.js"></script>

</body>
</html>
